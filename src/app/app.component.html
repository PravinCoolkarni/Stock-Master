<mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav mode="over" class="sidenav" [fixedInViewport]="true">
        <mat-nav-list>
            <a mat-list-item [routerLink]="['/']">
                <mat-icon class="logo-icon">trending_up</mat-icon>
                <span class="toolbar-title">Stock Master</span>
            </a>
            <a mat-list-item *ngFor="let item of header.navigationItems" [routerLink]="item.route"
               routerLinkActive="active-nav-item" (click)="sidenav.close()">
                <mat-icon mat-list-icon>{{item.icon}}</mat-icon>
                <span>{{item.label}}</span>
            </a>
        </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content>
        <app-header #header (toggleSidenav)="sidenav.toggle()"></app-header>
        <main class="main-content">
            <router-outlet></router-outlet>
        </main>
    </mat-sidenav-content>
</mat-sidenav-container>
