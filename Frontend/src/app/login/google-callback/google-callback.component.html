<app-loader [isLoading]="loading"></app-loader>

<div class="callback-page" *ngIf="!loading">
  <mat-card class="callback-card">
    <mat-card-content>
      <h2>Authentication error</h2>
      <p>Google sign-in could not be completed. Please try again.</p>
    </mat-card-content>
  </mat-card>
</div>
