<div class="full-screen-overlay" *ngIf="isLoading && variant === 'fullscreen'">
  <mat-spinner [diameter]="diameter"></mat-spinner>
  <h4>{{ message }}</h4>
</div>

<div class="inline-loader" *ngIf="isLoading && variant === 'inline'">
  <mat-spinner [diameter]="diameter"></mat-spinner>
  <p>{{ message }}</p>
</div>

<div class="button-loader" *ngIf="isLoading && variant === 'button'">
  <mat-spinner [diameter]="diameter"></mat-spinner>
</div>
